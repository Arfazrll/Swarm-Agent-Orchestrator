<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Intelligence | Blog Writer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="dark-mode">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1 class="glow-text">Swarm AI</h1>
            <p class="subtitle">Multi-Agent Blog Generation Engine</p>
        </header>

        <main>
            <div class="card main-card">
                <div class="input-group">
                    <input type="text" id="topicInput" placeholder="Enter a topic (e.g., The Future of AI in Space)..." autocomplete="off">
                    <button id="generateBtn" class="primary-btn">Generate Blog Post</button>
                </div>

                <div id="statusContainer" class="hidden">
                    <div class="loader-wrapper">
                        <div class="loader"></div>
                    </div>
                    <div class="status-info">
                        <span id="currentStatus">Starting agents...</span>
                    </div>
                    <div class="progress-bar-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                </div>

                <div id="logContainer" class="hidden">
                    <h3>Process Logs</h3>
                    <div id="logs" class="logs-window"></div>
                </div>

                <div id="resultContainer" class="hidden">
                    <div class="success-banner">
                        <div class="icon">✅</div>
                        <div class="text">
                            <h4 id="resultTitle">Success!</h4>
                            <p>Your blog post is ready for production.</p>
                        </div>
                    </div>
                    <a id="downloadLink" href="#" class="download-btn">Download PDF Report</a>
                    <button id="resetBtn" class="secondary-btn">New Topic</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Powered by Swarm Intelligence & Groq</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
